# ─────────────────────────────────────────────────────────────────────────────
# CD — Production Deployment
# Purpose : Build Docker image, push to Azure Container Registry (presaletool),
#           scan the image, generate SBOM, and deploy to Azure App Service
#           (agent-poc) as a Linux container. Sends Teams notification on
#           success or failure.
# Triggers: push → main | workflow_dispatch (manual)
# Auth     : OIDC (no stored Azure credentials)
# ─────────────────────────────────────────────────────────────────────────────

name: CD — Deploy to Production

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile"
  workflow_dispatch:

permissions:
  id-token: write    # OIDC token
  contents: read
  packages: write

concurrency:
  group: production-deploy
  cancel-in-progress: false  # never cancel an in-flight production deploy

env:
  ACR_LOGIN_SERVER: presaletool.azurecr.io
  IMAGE_NAME: agent-poc
  APP_SERVICE_NAME: agent-poc
  RESOURCE_GROUP: agent-poc

jobs:
  # ── 1. Build, Scan & Push ─────────────────────────────────────────────────
  build-and-push:
    name: Build → Scan → Push (ACR)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ── Azure OIDC Login ─────────────────────────────────────────────────
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── ACR Login (uses OIDC identity — no admin credentials) ────────────
      - name: Login to Azure Container Registry
        run: az acr login --name presaletool

      # ── Image metadata ───────────────────────────────────────────────────
      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=${GITHUB_SHA::8}
          echo "image-tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_FULL=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_LATEST=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest" >> "$GITHUB_ENV"

      # ── Docker build ─────────────────────────────────────────────────────
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: |
            ${{ env.IMAGE_FULL }}
            ${{ env.IMAGE_LATEST }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Trivy vulnerability scan (fail on CRITICAL/HIGH) ─────────────────
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.28.0
        with:
          image-ref: ${{ env.IMAGE_FULL }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "1"

      # ── SBOM generation ─────────────────────────────────────────────────
      - name: Generate SBOM
        uses: anchore/sbom-action@v0.18.0
        with:
          image: ${{ env.IMAGE_FULL }}
          artifact-name: sbom-${{ github.sha }}.spdx.json

      # ── Push to ACR ──────────────────────────────────────────────────────
      - name: Push image to ACR
        run: |
          docker push ${{ env.IMAGE_FULL }}
          docker push ${{ env.IMAGE_LATEST }}

  # ── 2. Deploy to Azure App Service ───────────────────────────────────────
  deploy:
    name: Deploy → App Service (Production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build-and-push
    environment: production

    steps:
      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_SERVICE_NAME }}
          resource-group-name: ${{ env.RESOURCE_GROUP }}
          images: ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ needs.build-and-push.outputs.image-tag }}

      - name: Verify deployment health
        run: |
          sleep 15
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            https://${{ env.APP_SERVICE_NAME }}.azurewebsites.net/ping)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Health check failed — /ping returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Health check passed (HTTP $HTTP_CODE)"

  # ── 3. Teams Notification ─────────────────────────────────────────────────
  notify:
    name: Teams Notification
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [build-and-push, deploy]

    steps:
      - name: Teams Notification — Success
        if: needs.deploy.result == 'success'
        uses: jdcargile/ms-teams-notification@v1.4
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
          notification-summary: "✅ agent-poc deployed successfully to Production — ${{ github.ref_name }} (${{ github.sha }})"
          notification-color: "28a745"
          timezone: "UTC"

      - name: Teams Notification — Failure
        if: needs.build-and-push.result == 'failure' || needs.deploy.result == 'failure'
        uses: jdcargile/ms-teams-notification@v1.4
        with:
          github-token: ${{ github.token }}
          ms-teams-webhook-uri: ${{ secrets.TEAMS_WEBHOOK_URL }}
          notification-summary: "❌ agent-poc deployment FAILED — ${{ github.ref_name }} (${{ github.sha }}) — check pipeline logs immediately"
          notification-color: "dc3545"
          timezone: "UTC"
