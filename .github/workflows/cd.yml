name: CD — Azure App Service

on:
  push:
    branches: [main]
    paths:
      - "**.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/cd.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "production"
        type: choice
        options:
          - production

permissions:
  id-token: write
  contents: read

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  APP_NAME_PROD:    ${{ vars.APP_NAME_PROD }}
  RESOURCE_GROUP:   ${{ vars.AZURE_RESOURCE_GROUP }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies into target folder
        run: pip install --target=".python_packages/lib/site-packages" -r requirements.txt

      - name: Zip deployment package
        run: zip -r app.zip . --exclude ".git/*" --exclude ".github/*" --exclude "__pycache__/*" --exclude "*.pyc"

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-package
          path: app.zip
          retention-days: 7

  deploy-prod:
    name: Deploy → Production
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: build

    environment:
      name: production
      url: https://${{ env.APP_NAME_PROD }}.azurewebsites.net/ping

    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-package

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Configure App Service — Python runtime
        uses: azure/cli@v2
        with:
          inlineScript: |
            az webapp config set \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --name "${{ env.APP_NAME_PROD }}" \
              --linux-fx-version "PYTHON|3.12" \
              --startup-file "python app.py"

      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME_PROD }}
          package: app.zip

      - name: Verify production health
        run: |
          echo "Waiting for app to restart..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ env.APP_NAME_PROD }}.azurewebsites.net/ping")
          if [ "$STATUS" != "200" ]; then
            echo "Production health check failed — HTTP $STATUS"
            exit 1
          fi
          echo "Production is healthy — HTTP $STATUS"
